[search]
max_points = 30
list_length = 1000
metric = "RBP"

[space.scorer]
embedding_size = { type = "int", min = 8, max = 256, scale = "pow2" }
regularization.user = { type = "float", min = 1e-4, max = 1, scale = "log" }
regularization.item = { type = "float", min = 1e-4, max = 1, scale = "log" }
weight = { type = "float", min = 5, max = 100 }

[pipeline]
file = "als-implicit.toml"
